name: 24/7 Local Sentinel Audit

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit_network:
    runs-on: ubuntu-latest

    steps:

      # ==========================
      # 1. CHECKOUT
      # ==========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================
      # 2. PYTHON
      # ==========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==========================
      # 3. CACHE MODELS (IMPORTANT)
      # ==========================
      - name: Cache HuggingFace + Torch
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/huggingface/hub
            ~/.cache/huggingface/transformers
          key: ${{ runner.os }}-sentinel-models-v2
          restore-keys: |
            ${{ runner.os }}-sentinel-models-

      # ==========================
      # 4. INSTALL DEPENDENCIES
      # ==========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install --no-cache-dir \
            requests \
            detoxify \
            transformers \
            torch \
            torchvision \
            pillow \
            opencv-python-headless

      # ==========================
      # 5. RUN SENTINEL
      # ==========================
      - name: Run Sentinel
        env:
          SENTINEL_KEY: ${{ secrets.SENTINEL_KEY }}
          HF_HUB_DISABLE_TELEMETRY: 1
        run: |
          python -u scripts/sentinel.py

      # ==========================
      # 6. SAVE HISTORY (ROBUST)
      # ==========================
      - name: Commit history
        run: |
          git config --global user.name "AI Sentinel Bot"
          git config --global user.email "sentinel@adswap.network"

          git add checked_ads.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update Sentinel registry"
          git pull --rebase || true
          git push
