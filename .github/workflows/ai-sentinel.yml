name: 24/7 AI Sentinel Audit

on:
  schedule:
    # Esegue lo script ogni 4 ore (alle 00:00, 04:00, 08:00, ecc.)
    - cron: '0 */4 * * *'
  # Permette di lanciare il controllo manualmente dal sito di GitHub
  workflow_dispatch:

jobs:
  audit_network:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Esecuzione AI Sentinel
        env:
          # Le API Key verranno passate dai Secret di GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sentinel.py
