name: Sentinel Audit

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HF
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-cache-v3

      - name: Install
        run: |
          pip install --upgrade pip
          pip install requests torch torchvision pillow transformers opencv-python-headless

      - name: Run Sentinel
        env:
          SENTINEL_KEY: ${{ secrets.SENTINEL_KEY }}
          HF_HUB_DISABLE_TELEMETRY: 1
          TRANSFORMERS_OFFLINE: 0
        run: python -u scripts/sentinel.py
