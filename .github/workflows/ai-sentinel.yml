name: 24/7 Local Sentinel Audit

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit_network:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dei modelli AI locali
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-models
          restore-keys: |
            ${{ runner.os }}-huggingface-models

      - name: Installazione Dipendenze AI
        run: |
          python -m pip install --upgrade pip
          pip install requests detoxify transformers torch torchvision pillow opencv-python-headless

      - name: Esecuzione Sentinel Locale
        env:
          SENTINEL_KEY: ${{ secrets.SENTINEL_KEY }}
        run: |
          python -u scripts/sentinel.py

      - name: Salva il registro di sistema
        run: |
          git config --global user.name "AI Sentinel Bot"
          git config --global user.email "sentinel@adswap.network"
          git add checked_ads.json || true
          git commit -m "Aggiornamento automatico registro Sentinel" || echo "Nessuna modifica da salvare"
          git push
