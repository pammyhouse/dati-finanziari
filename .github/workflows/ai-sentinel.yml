name: 24/7 AI Sentinel Audit

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit_network:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Esecuzione AI Sentinel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/sentinel.py

      - name: Salva il registro di sistema (Commit history)
        run: |
          git config --global user.name "AI Sentinel Bot"
          git config --global user.email "sentinel@adswap.network"
          git add checked_ads.json || true
          git commit -m "Aggiornamento automatico registro Sentinel" || echo "Nessuna modifica da salvare"
          git push
