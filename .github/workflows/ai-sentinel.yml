name: Sentinel 24/7 Audit

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sentinel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: sentinel-cache-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests torch torchvision transformers pillow opencv-python-headless

      - name: Run Sentinel
        env:
          SENTINEL_KEY: ${{ secrets.SENTINEL_KEY }}
          HF_HUB_DISABLE_TELEMETRY: 1
        run: python -u scripts/sentinel.py

      - name: Save history
        run: |
          git config --global user.name "AI Sentinel Bot"
          git config --global user.email "bot@sentinel.local"

          git add checked_ads.json || true

          git diff --cached --quiet && exit 0

          git pull --rebase || true
          git commit -m "update sentinel history"
          git push
